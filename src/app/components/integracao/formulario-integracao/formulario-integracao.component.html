<div style="padding: 30px;">
      <mat-form-field appearance="outline">
        <mat-label>Nome</mat-label>
        <input matInput required [(ngModel)]="integracaco.nome" type="text" placeholder="Nome">
      </mat-form-field>
  <div class="botoes">
    <button mat-raised-button class="me-8 mb-8" color="basic" mat-dialog-close type="submit">Fechar</button>
    <button mat-raised-button class="me-8 mb-8" color="primary" (click)="criarIntegracao()" type="submit">Salvar</button>
  </div>
</div>
<p-toast [showTransformOptions]="'translateY(100%)'" [showTransitionOptions]="'1000ms'"
  [hideTransitionOptions]="'800ms'" [showTransformOptions]="'translateX(100%)'" />
