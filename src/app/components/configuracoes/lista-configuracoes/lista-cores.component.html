<div class="table-responsive-sm">
  <table matSort (matSortChange)="sortData($event)" class="table table-striped table-hover">
    <thead>
      <tr>
        <th *ngIf="modoAll" mat-sort-header="rapida">Rápida</th>
        <th *ngIf="!modoAll" style="width: 10px;"></th>
        <th mat-sort-header="nome">Nome</th>
        <th>Cores</th>
        <th>Time</th>
        <th>Velocidade</th>
        <th>Parametros</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let cor of cores">
        <td *ngIf="modoAll"><p-checkbox disabled [(ngModel)]="cor.rapida" [binary]="true" inputId="binary"></p-checkbox></td>
        <td *ngIf="!modoAll" style="width: 10px;">
          <mat-radio-button [disabled]="!isAutorizado(true)" (change)="definirConfiguracao(cor)" class="example-radio-button" color="primary"
            [checked]="cor.id == idSelecionado" [value]="cor.id"></mat-radio-button>
        </td>
        <td>{{cor.nome}}</td>
        <td>
          <app-label-cor [cor]="cor" [agrupar]="true"></app-label-cor>
        </td>
        <td>{{cor.time}}</td>
        <td>{{cor.velocidade}}</td>
        <td>{{cor.parametros ? cor.parametros?.length : 0}}</td>
        <td>

          <i-feather *ngIf="modoAll && isAutorizado(true)" routerLink="/configuracoes/{{cor.id}}" name="edit" class="feather-base">
          </i-feather>
          <i-feather *ngIf="modoAll && isAutorizado(true)" routerLink="/configuracoes/parametros/{{cor.id}}" name="settings" class="feather-base">
          </i-feather>
          <i-feather *ngIf="isAutorizado(true)" (click)="remover(cor)" name="trash" class="feather-base">
          </i-feather>
        </td>
      </tr>
    </tbody>
  </table>
</div>
<mat-paginator #paginator class="demo-paginator" (page)="handlePageEvent($event)" [length]="page?.length"
  [pageSize]="page?.pageSize" [showFirstLastButtons]="true" [pageSizeOptions]="[15,20,50]"
  [pageIndex]="page?.pageIndex"></mat-paginator>

<p-toast [showTransformOptions]="'translateY(100%)'" [showTransitionOptions]="'1000ms'"
  [hideTransitionOptions]="'800ms'" [showTransformOptions]="'translateX(100%)'" />
