<mat-card class="w-100">
  <mat-card-content>

    <div class="box-botoes-direta" style="align-items: flex-start;">
      <div style="max-width: 400px;flex: 1;">
        <mat-form-field appearance="outline">
          <input (input)="this.nomeFind.next(pesquisa.value)" #pesquisa type="text" matInput
            placeholder="Pesquisar cliente">
          <mat-icon matSuffix aria-hidden="false" fontIcon="search"></mat-icon>
        </mat-form-field>
      </div>
      @if(permiteEditarCliente()){
      <button routerLink="0" mat-raised-button mat-button type="button" color="primary">
        <i-feather name="plus" class="feather-base" style="margin-right: 10px;"> </i-feather>
        Novo Cliente</button>
      }
    </div>
    <mat-tab-group mat-stretch-tabs="false" animationDuration="0" [selectedIndex]="tabSelect"
      (selectedTabChange)="onTabChange($event)">
      <mat-tab label="Ativos">
      </mat-tab>
      <mat-tab label="Inativos">
      </mat-tab>
    </mat-tab-group>

    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th></th>
            <th>Nome</th>
            <th>Ativo</th>
            <th>Endereco</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let cliente of clientes">
            <td><img src="assets/images/icon_white_64.png" width="25" height="25" class="rounded-circle"></td>
            <td>{{cliente.nome}}</td>
            <td>
              <span class="badge badge-{{cliente.ativo ? 'success' : 'danger'}} rounded-pill">
                {{cliente.ativo ? 'Ativo' : 'Inativo'}}</span>
            </td>
            <td>{{cliente.endereco ? cliente.endereco?.street + ' ' + cliente.endereco?.numero + ' ' + cliente.endereco?.city + ' - ' + cliente.endereco?.state : '' }}</td>
            <td *ngIf="isAutorizado">
              @if(permiteEditarCliente()){
              <i-feather tooltipPosition="top"  pTooltip="Editar cleinte" routerLink="{{cliente.id}}" name="edit" class="feather-base" style="margin-right: 10px;">
              </i-feather>
              <i-feather tooltipPosition="top"  pTooltip="Remover cliente" (click)="remover(cliente)" name="trash-2" class="feather-base" style="margin-right: 10px;">
              </i-feather>
            }
            </td>
          </tr>
        </tbody>
      </table>
      <mat-paginator #paginator
      (page)="handlePageEvent($event)"
      [length]="page?.length"
      [pageSize]="page?.pageSize"
      [showFirstLastButtons]="true"
      [pageSizeOptions]="[15,20,50]"
      [pageIndex]="page?.pageIndex"></mat-paginator>
      <p-toast [showTransformOptions]="'translateY(100%)'" [showTransitionOptions]="'1000ms'"
      [hideTransitionOptions]="'800ms'" [showTransformOptions]="'translateX(100%)'" />
