<mat-card class="w-100">
  <mat-card-content>
    <mat-tab-group mat-stretch-tabs="false" animationDuration="0" [selectedIndex]="tabSelect"
      (selectedTabChange)="onTabChange($event)">
      <mat-tab label="Cores e efeitos">
        <br>
        <app-lista-parametros [exibirBotoes]="{add: true, back: false}" [cor]="dispositivo?.cor" [dispositivo]="dispositivo"></app-lista-parametros>
      </mat-tab>
      <mat-tab label="Lista de cores">
        <app-lista-cores-dispositivo [dispositivo]="dispositivo" [tab]="tabSelect"></app-lista-cores-dispositivo>
      </mat-tab>
      <mat-tab label="Parametros">
        @if (dispositivo) {
        <app-parametros-dispositivo (salvarEmit)="salvarConfiguracao($event)"
          [dispositivo]="dispositivo"></app-parametros-dispositivo>
        }
      </mat-tab>
      <mat-tab label="Agendas">
        <app-lista-agenda-dispositivo></app-lista-agenda-dispositivo>
      </mat-tab>
      <mat-tab label="Logs">
      </mat-tab>
      <mat-tab *ngIf="isAutorizado(true)" label="Firmware">
        <app-atualizar-firmware [dispositivo]="dispositivo"></app-atualizar-firmware>
      </mat-tab>
    </mat-tab-group>
  </mat-card-content>
</mat-card>
<p-toast [showTransformOptions]="'translateY(100%)'" [showTransitionOptions]="'1000ms'"
  [hideTransitionOptions]="'800ms'" [showTransformOptions]="'translateX(100%)'" />
