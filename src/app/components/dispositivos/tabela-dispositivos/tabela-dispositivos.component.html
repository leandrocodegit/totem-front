<table class="table table-striped table-hover">
  <thead matSort (matSortChange)="sortData($event)" >
    <tr>
      <th *ngIf="!checkEmit"></th>
      <th *ngIf="checkEmit" style="width: 10px;"></th>
      <th mat-sort-header="nome" >Nome</th>
      <th mat-sort-header="mac" >Mac</th>
      <th>Status</th>
      <th>Conexão</th>
      <th *ngIf="!checkEmit">Efeito</th>
      <th>Endereço</th>
      <th *ngIf="exibirAcoes"></th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let device of dispositivos">
      <td *ngIf="!checkEmit">
        <i-feather *ngIf="!device.timer" tooltipPosition="top"  pTooltip="Enviar comando rápido"  (click)="comandoRapido(device, true)" name="cpu" [style.color]="device.cor ? device.cor.primaria : 'black'"
          class="feather-base" style="margin-right: 0px;"></i-feather>
          <div tooltipPosition="top" pTooltip="Enviar comando rápido" *ngIf="device.timer" (click)="comandoRapido(device)" class="spinner-grow spinner-grow-sm" style="color: #7003d7;cursor: pointer;"></div>
        </td>
      <td *ngIf="checkEmit" style="width: 20px;">
        <p-checkbox (onChange)="selecionarDispositivo(device)" [(ngModel)]="device.selecionado" [binary]="true" />
      </td>
      <td>{{device.nome}}</td>
      <td>{{device.mac}}</td>
      <td>
        @if(device.ativo){
        <span class="badge badge-info rounded-pill">Ativo</span>
        }@else{
        <span class="badge badge-danger rounded-pill">Inativo</span>
        }
      </td>
      <td>
        @if(device.conexao == 'Online'){
        <span class="badge badge-success rounded-pill">Online</span>
        }@else{
        <span class="badge badge-danger rounded-pill">Offline</span>
        }
      </td>
      <td *ngIf="!checkEmit">{{getTradutor(undefined, device.cor)}}</td>
      <td style="font-size: 11px;color: rgb(114, 139, 250); max-width: 220px;">{{device.enderecoCompleto}}</td>
      <td *ngIf="exibirAcoes">
        <i-feather tooltipPosition="top"   pTooltip="Enviar comando de teste" [style.color]="device.conexao == 'Online' ? 'green' : 'black'" (click)="testar(device)" name="play-circle" class="feather-base"></i-feather>
        <i-feather tooltipPosition="top"  pTooltip="Ver informações do dispositivo" (click)="detalhes(device)" name="info" class="feather-base"></i-feather>
        <i-feather tooltipPosition="top"  pTooltip="Editar dispositivo" (click)="editar(device)" name="edit" class="feather-base"></i-feather>
        <i-feather tooltipPosition="top"  pTooltip="Configurar dispositivo" (click)="configurar(device)" name="settings" class="feather-base"></i-feather>
        <i-feather tooltipPosition="top"  pTooltip="Dincronizar cor dispositivo" (click)="sincronizar(device, false)" name="refresh-ccw" class="feather-base"></i-feather>
        <i-feather tooltipPosition="top"  pTooltip="Ativar ou inativar" (click)="mudarStatus(device)" name="power" class="feather-base"
          [style.color]="device.ativo ? 'green' : 'black'"> </i-feather>
      </td>
    </tr>
  </tbody>
</table>
<mat-paginator #paginator
(page)="handlePageEvent($event)"
[length]="page?.length"
[pageSize]="page?.pageSize"
[showFirstLastButtons]="true"
[pageSizeOptions]="[15,20,50]"
[pageIndex]="page?.pageIndex"></mat-paginator>
